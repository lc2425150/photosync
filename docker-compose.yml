services:
  photosync:
    # ── 方式一：从 GitHub Container Registry 拉取（需先发布）──
    # image: ghcr.io/lc2425150/photosync:latest

    # ── 方式二：本地构建（推荐首次使用）──
    build: .

    image: photosync:latest
    container_name: photosync
    ports:
      - "8932:8932"
    volumes:
      # 相机储存卡挂载路径（只读）
      - /media:/media:ro
      - /mnt:/mnt:ro
      - /run/media:/run/media:ro
      # 照片存储目标路径（NAS 实际照片目录 → 容器内 /photos）
      - /volume2/照片:/photos:rw
      # 应用数据持久化（数据库、缩略图等）
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - POLL_INTERVAL=5
      # 照片目录在 NAS 上的真实路径（路径映射用）
      - PHOTOS_MOUNT_HOST_PATH=/volume2/照片
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 128M
    restart: unless-stopped
