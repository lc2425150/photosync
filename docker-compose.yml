services:
  photosync:
    build: .
    image: photosync:latest
    container_name: photosync
    ports:
      - "8932:8932"
    volumes:
      # ── 储存卡扫描路径（使用 rslave 传播，让 USB 子挂载透传到容器）──
      - type: bind
        source: /media
        target: /media
        read_only: true
        bind:
          propagation: rslave
      - type: bind
        source: /mnt
        target: /mnt
        read_only: true
        bind:
          propagation: rslave
      - type: bind
        source: /run/media
        target: /run/media
        read_only: true
        bind:
          propagation: rslave
      # ── 照片存储目录 ──
      - /volume2/Photos:/photos:rw
      # ── 应用数据持久化 ──
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - POLL_INTERVAL=5
      - PHOTOS_MOUNT_HOST_PATH=/volume2/Photos
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 128M
    restart: unless-stopped
