<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PhotoSync - NAS 照片同步管理</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div class="app-shell" v-if="!loading">
    <nav class="top-nav" v-if="$route.path!=='/setup'">
      <div class="nav-inner">
        <div class="nav-left">
          <span class="logo">📷 PhotoSync</span>
          <router-link v-for="item in navItems" :key="item.path" :to="item.path"
            class="nav-link" :class="{active:$route.path.startsWith(item.path)}">{{ item.label }}</router-link>
        </div>
        <div class="nav-right">
          <button class="theme-btn" @click="toggleTheme" :title="isDark?'切换到亮色模式':'切换到暗色模式'">{{ isDark ? '☀️' : '🌙' }}</button>
        </div>
      </div>
    </nav>
    <main class="main-content"><router-view /></main>
  </div>
  <div class="loading-screen" v-else>
    <div class="spinner"></div>
    <p>PhotoSync 加载中...</p>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
<script src="https://unpkg.com/pinia@2/dist/pinia.iife.prod.js"></script>
<script src="js/api.js"></script>
<script src="js/stores.js"></script>
<script src="js/views.js"></script>
<script src="js/app.js"></script>
</body>
</html>
